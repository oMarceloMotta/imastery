<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Mastery OS — Protótipo</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ============ ONBOARDING ============ -->
<div id="onboard">
  <div style="text-align:center;margin-bottom:8px;font-size:26px;font-weight:700">🧠 <span style="background:linear-gradient(90deg,#6366f1,#8b5cf6);-webkit-background-clip:text;background-clip:text;color:transparent">AI Mastery OS</span></div>
  <p style="text-align:center;color:var(--muted);margin-bottom:26px;font-size:14px">De iniciante a especialista com um plano que se adapta a você.</p>
  <div class="steps" id="ob-steps"></div>
  <div id="ob-body" class="card" style="padding:26px"></div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <!-- Topbar só aparece no mobile -->
  <div id="topbar">
    <button id="menu-btn" onclick="toggleMenu()" aria-label="Menu">☰</button>
    <div id="topbar-title">🧠 AI Mastery OS</div>
    <button class="util-btn" onclick="toggleTheme()" title="Tema">🌓</button>
  </div>
  <div id="sidebar-overlay" onclick="toggleMenu()"></div>
  <div id="sidebar">
    <div id="logo">🧠 <span class="full"><span>AI Mastery</span> OS</span></div>
    <div id="area-switch"><select id="area-sel" onchange="trocarArea(this.value)"></select></div>
    <button class="nav-item active" data-v="dash"><span class="ico">📊</span><span class="lbl">Dashboard</span></button>
    <button class="nav-item" data-v="hoje"><span class="ico">✅</span><span class="lbl">Hoje</span></button>
    <button class="nav-item" data-v="praticar"><span class="ico">🎯</span><span class="lbl">Exercícios</span></button>
    <button class="nav-item" data-v="sprint"><span class="ico">⚡</span><span class="lbl">Sprint 1-Dia</span></button>
    <button class="nav-item" data-v="backlog"><span class="ico">📥</span><span class="lbl">Backlog</span></button>
    <button class="nav-item" data-v="roadmap"><span class="ico">🗺️</span><span class="lbl">Roadmap</span></button>
    <button class="nav-item" data-v="carreira"><span class="ico">💼</span><span class="lbl">Carreira</span></button>
    <button class="nav-item" data-v="ia"><span class="ico">🤖</span><span class="lbl">Decisões da IA</span></button>
    <button class="nav-item" data-v="aprenda"><span class="ico">🛠️</span><span class="lbl">Construir</span></button>
    <button class="nav-item" data-v="leituras"><span class="ico">📚</span><span class="lbl">Leituras</span></button>
    <button class="nav-item" data-v="ingles"><span class="ico">🌐</span><span class="lbl">Inglês de TI</span></button>
    <button class="nav-item" data-v="projetos"><span class="ico">🚀</span><span class="lbl">Projetos IA</span></button>
    <button class="nav-item" data-v="arqs"><span class="ico">🏛️</span><span class="lbl">Arquiteturas</span></button>
    <div style="margin-top:auto">
      <div class="side-utils">
        <button class="util-btn" onclick="toggleTheme()" title="Alternar tema claro/escuro">🌓</button>
        <button class="util-btn" onclick="exportarDados()" title="Exportar progresso (backup .json)">💾</button>
        <button class="util-btn" onclick="document.getElementById('import-file').click()" title="Importar progresso">📂</button>
      </div>
      <div id="save-ind"></div>
      <div id="userbox"></div>
    </div>
    <input type="file" id="import-file" accept=".json" class="hidden" onchange="importarDados(this)">
  </div>
  <div id="main"></div>
</div>

<div id="modal-bg" class="hidden"><div id="modal"></div></div>
<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
