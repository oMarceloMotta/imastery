<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Mastery OS — Protótipo</title>
<style>
:root{
  --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --border:#2a3140;
  --text:#e6edf3; --muted:#8b96a8; --accent:#6366f1; --accent2:#8b5cf6;
  --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444; --info:#38bdf8;
  --radius:14px;
}
body.light{
  --bg:#f2f4f8; --panel:#ffffff; --panel2:#eef1f6; --border:#d9dfe9;
  --text:#1b2333; --muted:#5c6b82; --accent:#5457e0; --accent2:#7c3aed;
}
body.light .toast-item{box-shadow:0 8px 30px rgba(0,0,0,.15)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;font-size:15px;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none}
input,textarea,select{font-family:inherit;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:14px;width:100%}
textarea{resize:vertical;min-height:70px}
h1,h2,h3{font-weight:600}
.hidden{display:none!important}

/* ===== Layout ===== */
#app{display:flex;min-height:100vh}
#sidebar{width:220px;background:var(--panel);border-right:1px solid var(--border);padding:20px 12px;position:sticky;top:0;height:100vh;flex-shrink:0;display:flex;flex-direction:column}
#logo{font-size:17px;font-weight:700;padding:0 10px 18px;letter-spacing:.3px}
#logo span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--muted);font-size:14px;margin-bottom:2px;background:none;width:100%;text-align:left;transition:.15s}
.nav-item:hover{background:var(--panel2);color:var(--text)}
.nav-item.active{background:linear-gradient(90deg,rgba(99,102,241,.18),rgba(139,92,246,.10));color:var(--text);font-weight:600}
.nav-item .ico{width:20px;text-align:center}
#userbox{margin-top:auto;padding:12px;border-top:1px solid var(--border);font-size:13px;color:var(--muted)}
#userbox b{color:var(--text);display:block;font-size:14px}
#main{flex:1;padding:26px 30px;max-width:1150px}
.page-title{font-size:22px;margin-bottom:4px}
.page-sub{color:var(--muted);font-size:14px;margin-bottom:22px}

/* ===== Cards / grid ===== */
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr}#sidebar{width:64px}.nav-item .lbl,#logo .full,#userbox{display:none}}
.kpi{text-align:left}
.kpi .val{font-size:24px;font-weight:700;margin:4px 0 2px}
.kpi .lbl{color:var(--muted);font-size:12.5px;text-transform:uppercase;letter-spacing:.5px}
.kpi .sub{font-size:12.5px;color:var(--muted)}

/* ===== Bars ===== */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-row .bn{width:150px;font-size:13.5px;flex-shrink:0}
.bar-track{flex:1;height:10px;background:var(--panel2);border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s}
.bar-row .bv{width:44px;text-align:right;font-size:13px;font-weight:600}
.lv-tag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}

/* ===== Chips / badges ===== */
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:3px 10px;border-radius:20px;background:var(--panel2);border:1px solid var(--border);color:var(--muted)}
.chip.acc{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#a5b4fc}
.chip.ok{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.35);color:#4ade80}
.chip.warn{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.35);color:#fbbf24}
.chip.bad{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.35);color:#f87171}
.chip.info{background:rgba(56,189,248,.12);border-color:rgba(56,189,248,.35);color:#7dd3fc}

/* ===== Buttons ===== */
.btn{padding:10px 18px;border-radius:10px;font-size:14px;font-weight:600;transition:.15s}
.btn-p{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff}
.btn-p:hover{filter:brightness(1.15)}
.btn-s{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
.btn-s:hover{border-color:var(--accent)}
.btn-sm{padding:6px 12px;font-size:13px;border-radius:8px}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* ===== Tasks ===== */
.task{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.task.done{opacity:.55}
.task .tinfo{flex:1}
.task .ttl{font-weight:600;font-size:14.5px;margin-bottom:5px}
.task .tmeta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.task .tdesc{font-size:13px;color:var(--muted);line-height:1.45}
.tipo-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;background:var(--panel2)}

/* ===== Onboarding ===== */
#onboard{max-width:680px;margin:40px auto;padding:0 20px}
#onboard .steps{display:flex;gap:6px;margin-bottom:26px}
#onboard .step-dot{flex:1;height:4px;border-radius:4px;background:var(--panel2)}
#onboard .step-dot.on{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0}
.opt{background:var(--panel);border:1.5px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:.15s;text-align:left}
.opt:hover{border-color:var(--accent)}
.opt.sel{border-color:var(--accent);background:rgba(99,102,241,.10)}
.opt b{display:block;font-size:14.5px;margin-bottom:3px}
.opt small{color:var(--muted);font-size:12.5px;line-height:1.4}
.diag-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.diag-row .dn{width:170px;font-size:13.5px}
.diag-row input[type=range]{flex:1}
.diag-row .dl{width:100px;font-size:12px;color:var(--muted);text-align:right}

/* ===== Roadmap ===== */
.mod{border-left:3px solid var(--border);padding:0 0 22px 20px;position:relative}
.mod::before{content:'';position:absolute;left:-8.5px;top:2px;width:14px;height:14px;border-radius:50%;background:var(--panel2);border:2px solid var(--border)}
.mod.on::before{background:var(--accent);border-color:var(--accent)}
.mod.done-m::before{background:var(--ok);border-color:var(--ok)}
.mod.locked{opacity:.45}
.mod h3{font-size:15.5px;margin-bottom:3px}
.mod .mo{color:var(--muted);font-size:13px;margin-bottom:8px}

/* ===== Modal ===== */
#modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
#modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;max-width:560px;width:100%;padding:24px;max-height:90vh;overflow-y:auto}
/* ===== Quiz ===== */
.quiz-opt{display:block;width:100%;text-align:left;background:var(--panel2);border:1.5px solid var(--border);color:var(--text);border-radius:10px;padding:12px 14px;font-size:14px;margin-bottom:8px;transition:.15s;line-height:1.4}
.quiz-opt:hover{border-color:var(--accent)}
.quiz-opt.certo{border-color:var(--ok);background:rgba(34,197,94,.12)}
.quiz-opt.errado{border-color:var(--bad);background:rgba(239,68,68,.12)}
.quiz-opt:disabled{cursor:default;opacity:1}
.quiz-exp{background:var(--panel2);border-left:3px solid var(--info);border-radius:8px;padding:10px 12px;font-size:13px;line-height:1.5;margin:10px 0;color:var(--muted)}
.quiz-prog{display:flex;gap:5px;margin-bottom:14px}
.quiz-prog span{flex:1;height:5px;border-radius:4px;background:var(--panel2)}
.quiz-prog span.hit{background:var(--ok)}
.quiz-prog span.miss{background:var(--bad)}
.quiz-prog span.cur{background:var(--accent)}
.howto{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.howto .hstep{flex:1;min-width:150px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:12.5px;color:var(--muted);line-height:1.45}
.howto .hstep b{color:var(--text);display:block;font-size:13px;margin-bottom:3px}

.rate-row{display:flex;gap:8px;margin:12px 0 18px}
.rate-btn{flex:1;padding:10px 4px;border-radius:10px;background:var(--panel2);border:1.5px solid var(--border);color:var(--muted);font-size:12.5px;font-weight:600;text-align:center}
.rate-btn.sel{border-color:var(--accent);color:var(--text);background:rgba(99,102,241,.12)}
.field-lbl{font-size:13px;font-weight:600;margin:14px 0 6px;display:block}

/* ===== IA log ===== */
.ia-log-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.5}
.ia-log-item:last-child{border-bottom:none}
.ia-log-item .when{color:var(--muted);font-size:11.5px;white-space:nowrap;padding-top:2px}

/* ===== Toast ===== */
#toast{position:fixed;bottom:24px;right:24px;z-index:99;display:flex;flex-direction:column;gap:8px}
.toast-item{background:var(--panel);border:1px solid var(--accent);border-radius:12px;padding:12px 16px;font-size:13.5px;max-width:340px;box-shadow:0 8px 30px rgba(0,0,0,.5);animation:tin .3s}
@keyframes tin{from{transform:translateY(12px);opacity:0}to{transform:none;opacity:1}}

/* ===== Área switcher / utilitários da sidebar ===== */
#area-switch{margin:4px 10px 14px}
#area-switch select{font-size:13px;padding:8px 10px}
.side-utils{display:flex;gap:6px;padding:10px 10px 4px;flex-wrap:wrap}
.util-btn{flex:1;min-width:44px;background:var(--panel2);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:7px 4px;font-size:15px;transition:.15s}
.util-btn:hover{color:var(--text);border-color:var(--accent)}
#save-ind{font-size:11px;color:var(--muted);text-align:center;padding:6px 0 0;min-height:18px}
#save-ind.ok{color:var(--ok)}
#save-ind.err{color:var(--warn)}

.section-h{display:flex;align-items:center;justify-content:space-between;margin:24px 0 12px}
.section-h h2{font-size:16.5px}
.gap-pill{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:8px}
progress{width:100%}

/* ===== Aba Construir (guia de aprendizado) ===== */
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:8px}
.lesson-card{cursor:pointer;transition:.15s}
.lesson-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.lesson-card.done{opacity:.72}
pre.code{background:#0b0f14;border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-size:12.5px;line-height:1.6;overflow-x:auto;font-family:ui-monospace,'Cascadia Code',Consolas,monospace;color:#dbe4f0;margin:10px 0;white-space:pre}
body.light pre.code{background:#141a24}
.lesson-body h3{margin:22px 0 6px;font-size:15px;color:var(--accent2)}
.lesson-body h3:first-child{margin-top:0}
.lesson-body p{color:var(--muted);font-size:13.8px;line-height:1.7;margin:8px 0}
.lesson-body ul,.lesson-body ol{margin:8px 0 8px 20px;color:var(--muted);font-size:13.8px;line-height:1.8}
.lesson-body b,.lesson-body code{color:var(--text)}
.lesson-body code{background:var(--panel2);border:1px solid var(--border);border-radius:5px;padding:1px 6px;font-size:12.5px;font-family:ui-monospace,Consolas,monospace}
.onde{background:var(--panel2);border-left:3px solid var(--accent);border-radius:8px;padding:11px 14px;font-size:13px;color:var(--muted);margin:12px 0;line-height:1.7}
.desafio{background:linear-gradient(90deg,rgba(99,102,241,.14),rgba(139,92,246,.06));border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:13.5px;margin:14px 0;line-height:1.7;color:var(--muted)}
</style>
</head>
<body>

<!-- ============ ONBOARDING ============ -->
<div id="onboard">
  <div style="text-align:center;margin-bottom:8px;font-size:26px;font-weight:700">🧠 <span style="background:linear-gradient(90deg,#6366f1,#8b5cf6);-webkit-background-clip:text;background-clip:text;color:transparent">AI Mastery OS</span></div>
  <p style="text-align:center;color:var(--muted);margin-bottom:26px;font-size:14px">De iniciante a especialista com um plano que se adapta a você.</p>
  <div class="steps" id="ob-steps"></div>
  <div id="ob-body" class="card" style="padding:26px"></div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <div id="sidebar">
    <div id="logo">🧠 <span class="full"><span>AI Mastery</span> OS</span></div>
    <div id="area-switch"><select id="area-sel" onchange="trocarArea(this.value)"></select></div>
    <button class="nav-item active" data-v="dash"><span class="ico">📊</span><span class="lbl">Dashboard</span></button>
    <button class="nav-item" data-v="hoje"><span class="ico">✅</span><span class="lbl">Hoje</span></button>
    <button class="nav-item" data-v="praticar"><span class="ico">🎯</span><span class="lbl">Exercícios</span></button>
    <button class="nav-item" data-v="sprint"><span class="ico">⚡</span><span class="lbl">Sprint 1-Dia</span></button>
    <button class="nav-item" data-v="backlog"><span class="ico">📥</span><span class="lbl">Backlog</span></button>
    <button class="nav-item" data-v="roadmap"><span class="ico">🗺️</span><span class="lbl">Roadmap</span></button>
    <button class="nav-item" data-v="carreira"><span class="ico">💼</span><span class="lbl">Carreira</span></button>
    <button class="nav-item" data-v="ia"><span class="ico">🤖</span><span class="lbl">Decisões da IA</span></button>
    <button class="nav-item" data-v="aprenda"><span class="ico">🛠️</span><span class="lbl">Construir</span></button>
    <button class="nav-item" data-v="leituras"><span class="ico">📚</span><span class="lbl">Leituras</span></button>
    <button class="nav-item" data-v="ingles"><span class="ico">🌐</span><span class="lbl">Inglês de TI</span></button>
    <button class="nav-item" data-v="projetos"><span class="ico">🚀</span><span class="lbl">Projetos IA</span></button>
    <button class="nav-item" data-v="arqs"><span class="ico">🏛️</span><span class="lbl">Arquiteturas</span></button>
    <div style="margin-top:auto">
      <div class="side-utils">
        <button class="util-btn" onclick="toggleTheme()" title="Alternar tema claro/escuro">🌓</button>
        <button class="util-btn" onclick="exportarDados()" title="Exportar progresso (backup .json)">💾</button>
        <button class="util-btn" onclick="document.getElementById('import-file').click()" title="Importar progresso">📂</button>
      </div>
      <div id="save-ind"></div>
      <div id="userbox"></div>
    </div>
    <input type="file" id="import-file" accept=".json" class="hidden" onchange="importarDados(this)">
  </div>
  <div id="main"></div>
</div>

<div id="modal-bg" class="hidden"><div id="modal"></div></div>
<div id="toast"></div>

/* ---------- Segurança (lição 🛡️ do guia Construir, aplicada aqui) ---------- */
// esc: escape na SAÍDA — texto do usuário nunca vira HTML
function esc(s){ return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
// urlSegura: só http(s) entra em href — bloqueia javascript: e data:
function urlSegura(u){ u = String(u??"").trim(); return /^https?:\/\//i.test(u) ? esc(u) : ""; }
// sanitizarEstado: fronteira de IMPORTAÇÃO — um .json de fora não pode
// carregar HTML executável para dentro do estado (XSS armazenado)
function sanitizarEstado(o){
  for(const k in o){
    const v = o[k];
    if(typeof v === "string"){ if(/[<>]/.test(v)) o[k] = v.replace(/</g,"‹").replace(/>/g,"›"); }
    else if(v && typeof v === "object") sanitizarEstado(v);
  }
  return o;
}

/* ---- datas reais (motor de dias) ---- */
function localDate(d){ const x = d?new Date(d):new Date(); return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0"); }
function addDias(n){ const d = new Date(); d.setDate(d.getDate()+n); return localDate(d); }
function diffDias(a,b){ return Math.round((new Date(b+"T12:00")-new Date(a+"T12:00"))/86400000); }
function labelDue(due){
  const d = diffDias(localDate(), due);
  return d<0 ? "vencida há "+(-d)+"d" : d===0 ? "vence hoje" : d===1 ? "amanhã" : "em "+d+"d";
}

/* Virada de dia: renova o plano, cobra revisões vencidas e ajusta o streak */
function checarNovoDia(){
  const hoje = localDate();
  let mudou = false;
  for(const k in ROOT.areas){
    const st = ROOT.areas[k];
    if(st.lastDia !== hoje){
      st.tasks.forEach(t=>{ if(t.status==="hoje") t.status="backlog"; });
      if(st.lastAtivo && diffDias(st.lastAtivo, hoje) > 1 && st.streak>0){
        st.iaLog.unshift({ts:Date.now(), msg:`💔 Streak quebrado: ${diffDias(st.lastAtivo,hoje)-1} dia(s) sem atividade. Constância vale mais que intensidade — recomece hoje.`});
        st.streak = 0;
      }
      st.lastDia = hoje;
      mudou = true;
    }
  }
  if(mudou){
    S = ROOT.areas[ROOT.current];
    reabastecerBacklog();
    planejarHoje();
    const vencidas = S.tasks.filter(t=>t.tipo==="Revisão" && t.status!=="done" && t.dueDate && t.dueDate<=hoje).length;
    logIA(`🌅 Novo dia (${new Date().toLocaleDateString("pt-BR")}): plano renovado dentro das suas ${S.profile.horas}h. Tarefas de ontem não concluídas voltaram ao backlog${vencidas?`; ${vencidas} revisão(ões) vencida(s) entram primeiro`:""}.`);
    store.save();
  }
  return mudou;
}

/* =====================================================
   MOTOR ADAPTATIVO
===================================================== */
function scoreDe(c){ return S.comps[c]?.score ?? 0; }
function nivelTarefaPara(c){ const s = scoreDe(c); return s<25?1:s<50?2:s<70?3:s<85?4:5; }

function prioridadeComp(){
  // prioriza: alta demanda de mercado + score baixo (maior gap de impacto)
  const area = AREAS[S.profile.area];
  return [...area.comps].sort((a,b)=>{
    const pa = a.m*0.55 + (100-scoreDe(a.n))*0.45;
    const pb = b.m*0.55 + (100-scoreDe(b.n))*0.45;
    return pb-pa;
  });
}

function gerarTarefa(comp, opts={}){
  const lvl = opts.lvl ?? nivelTarefaPara(comp);
  let pool = TEMPLATES.filter(t => t.lvls.includes(lvl) && t.tipo!=="Revisão");
  if(!pool.length) pool = TEMPLATES.filter(t=>t.tipo!=="Revisão");
  // peso dobrado para Produção: publicar > acumular — é o que constrói referência
  const prod = pool.find(t=>t.tipo==="Produção");
  if(prod && !opts.tipo) pool = pool.concat([prod]);
  if(opts.tipo) pool = TEMPLATES.filter(t=>t.tipo===opts.tipo);
  const tpl = opts.tipo==="Revisão" ? TEMPLATES.find(t=>t.tipo==="Revisão") : pick(pool);
  const tr = trilhaDe(comp) || {top:[comp], proj:["um projeto aplicado de "+comp]};
  const tp = pick(tr.top), pj = pick(tr.proj);
  return { id:uid(), titulo: opts.titulo ?? tpl.t(comp,tp,pj), desc: opts.desc ?? tpl.d(comp,tp,pj,tr),
    passos: tpl.passos ? tpl.passos(comp,tp,pj) : [], topico: tp,
    tipo:tpl.tipo, ico:tpl.ico, comp, nivel:lvl, tempo:tpl.tempo, xp:Math.round(tpl.xp*(1+lvl*0.15)),
    crit:tpl.crit, status: opts.status ?? "backlog", origem: opts.origem ?? "IA — plano inicial",
    dueDate: opts.dueDate ?? null, revN: opts.revN ?? null };
}

function gerarDesafioMilestone(){
  const area = AREAS[S.profile.area];
  const usados = S.tasks.filter(t=>t.tipo==="Milestone").length;
  if(usados >= area.desafios.length) return null;
  const txt = area.desafios[usados].replace(/^Desafio:\s*/,"");
  return { id:uid(), titulo:"⭐ Marco: " + (txt.length>70? txt.slice(0,70)+"…" : txt), desc:area.desafios[usados],
    tipo:"Milestone", ico:"⭐", comp:"Projeto integrador", nivel:4, tempo:8, xp:300,
    crit:"Projeto publicado no GitHub + artigo ou apresentação defendendo as decisões.",
    status:"backlog", origem:"IA — marco de especialização", due:null };
}

function reabastecerBacklog(){
  const backlog = S.tasks.filter(t=>t.status==="backlog" && t.tipo!=="Revisão");
  const alvo = 6;
  let add = 0;
  const prio = prioridadeComp();
  let i = 0;
  while(backlog.length + add < alvo && i < prio.length*2){
    const comp = prio[i % prio.length].n;
    const jaTem = S.tasks.filter(t=>t.status!=="done" && t.comp===comp).length;
    if(jaTem < 3){
      const nt = gerarTarefa(comp, {origem:"IA — backlog evolutivo (gap: "+comp+")"});
      S.tasks.push(nt); add++;
      logIA(`Backlog reabastecido: criei "${nt.titulo}" — ${comp} tem score ${scoreDe(comp)}% e demanda de mercado ${AREAS[S.profile.area].comps.find(c=>c.n===comp).m}%.`);
    }
    i++;
  }
  // garante sempre ao menos 1 tarefa de publicação viva no plano
  if(!S.tasks.some(t=>t.status!=="done" && t.tipo==="Produção")){
    const melhor = [...AREAS[S.profile.area].comps].sort((a,b)=>scoreDe(b.n)-scoreDe(a.n))[0];
    const pt = gerarTarefa(melhor.n, {tipo:"Produção", origem:"IA — autoridade: publique o que você já domina ("+melhor.n+" é seu ponto forte)"});
    S.tasks.push(pt);
    logIA(`Sem publicação no plano → criei "${pt.titulo}". Regra do sistema: sempre existe uma prova pública em andamento.`);
  }
}

function planejarHoje(){
  // monta o dia respeitando o orçamento de horas
  const budget = S.profile.horas;
  const hj = localDate();
  let usado = S.tasks.filter(t=>t.status==="hoje").reduce((a,t)=>a+t.tempo,0);
  // 1. revisões vencidas/do dia primeiro (as mais antigas antes)
  S.tasks.filter(t=>t.status==="backlog" && t.tipo==="Revisão" && (!t.dueDate || t.dueDate<=hj))
    .sort((a,b)=>(a.dueDate||"").localeCompare(b.dueDate||""))
    .forEach(t=>{ if(usado + t.tempo <= budget){ t.status="hoje"; usado += t.tempo; } });
  // 2. depois, tarefas do backlog por prioridade (revisões futuras ficam agendadas)
  const ordem = prioridadeComp().map(c=>c.n);
  const cand = S.tasks.filter(t=>t.status==="backlog" && !(t.tipo==="Revisão" && t.dueDate && t.dueDate>hj))
    .sort((a,b)=>ordem.indexOf(a.comp)-ordem.indexOf(b.comp));
  for(const t of cand){ if(usado + t.tempo <= budget){ t.status="hoje"; usado += t.tempo; } }
}

function concluirTarefa(task, rating, evidencia, entregou, linkProva){
  task.status = "done"; task.rating = rating; task.evidencia = evidencia;
  S.stats.tarefas++; S.stats.horas += task.tempo;
  if(task.tipo==="Revisão") S.stats.revisoes++;
  if(task.tipo==="Prática"||task.tipo==="Desafio"||task.tipo==="Milestone") S.stats.projetos++;
  if(task.tipo==="Produção") S.stats.publicacoes++;
  S.xp += task.xp + (entregou?20:0) + (rating>=4?15:0);
  S.history.push({ts:Date.now(), taskId:task.id, comp:task.comp, rating});

  // streak real: primeiro item concluído no dia conta o dia
  const hj = localDate();
  if(S.lastAtivo !== hj){
    S.streak = (S.lastAtivo && diffDias(S.lastAtivo, hj)===1) ? (S.streak||0)+1 : 1;
    S.lastAtivo = hj; S.diasAtivos = (S.diasAtivos||0)+1;
    if(S.streak>1) toast("🔥 "+S.streak+" dias seguidos — constância constrói especialistas!");
  }

  // PROVA PÚBLICA — a métrica que constrói referência
  const tiposProva = ["Produção","Prática","Desafio","Milestone"];
  if(entregou && tiposProva.includes(task.tipo)){
    (S.provas = S.provas||[]).push({tipo:task.tipo, titulo:task.titulo, comp:task.comp, link:(linkProva||"").trim(), data:new Date().toLocaleDateString("pt-BR")});
    S.xp += 50;
    logIA(`🏆 Prova pública registrada: "${task.titulo}"${linkProva?" ("+linkProva+")":""}. Autoridade se constrói com o que o mundo vê — +50 XP bônus. Total: ${S.provas.length} prova(s).`);
    toast("🏆 Prova pública #"+S.provas.length+" registrada! +50 XP");
  }

  // atualização de score
  const c = S.comps[task.comp];
  if(c){
    const bonus = entregou?1.3:1;
    const delta = Math.round((rating-2) * (3 + task.nivel*1.2) * bonus);
    const antes = c.score;
    c.score = Math.max(0, Math.min(100, c.score + delta));
    logIA(`Avaliei "${task.titulo}": autoavaliação "${RATINGS[rating-1]}"${entregou?" + evidência entregue":""} → ${task.comp} foi de ${antes}% para ${c.score}% (${delta>=0?"+":""}${delta}).`);
  }

  // ADAPTAÇÃO
  if(rating<=2 && c){
    const rev = gerarTarefa(task.comp,{tipo:"Revisão",status:"hoje",origem:"IA — adaptação: desempenho baixo",dueDate:localDate(),revN:0});
    const facil = gerarTarefa(task.comp,{lvl:Math.max(1,task.nivel-1),origem:"IA — adaptação: dificuldade reduzida"});
    S.tasks.push(rev,facil);
    logIA(`Desempenho baixo em ${task.comp} → reduzi a dificuldade, criei revisão imediata e um exercício de nível ${Math.max(1,task.nivel-1)}.`);
    toast("🤖 IA adaptou o plano: dificuldade reduzida + revisão criada para "+task.comp);
  } else if(rating>=4 && c){
    const dificil = gerarTarefa(task.comp,{lvl:Math.min(5,task.nivel+1),origem:"IA — adaptação: desempenho alto, dificuldade ampliada"});
    S.tasks.push(dificil);
    logIA(`Desempenho alto em ${task.comp} → aumentei a dificuldade: nova tarefa de nível ${Math.min(5,task.nivel+1)} no backlog.`);
    toast("🤖 IA adaptou o plano: próximo desafio de "+task.comp+" será mais difícil");
    if(c.score>=70 && Math.random()<0.5){
      const m = gerarDesafioMilestone();
      if(m){ S.tasks.push(m); logIA(`Você atingiu nível avançado em ${task.comp} → desbloqueei um marco de especialização: "${m.titulo}".`); toast("⭐ Novo marco de especialização desbloqueado!"); }
    }
  }

  // repetição espaçada REAL: 1d → 7d → 30d → 90d, agendada por data
  if(task.tipo!=="Revisão"){
    S.tasks.push(gerarTarefa(task.comp,{tipo:"Revisão", origem:"IA — repetição espaçada (1ª revisão)", dueDate:addDias(1), revN:0}));
  } else if((task.revN??0) < REV_INTERVALOS.length-1){
    const n = (task.revN??0)+1;
    S.tasks.push(gerarTarefa(task.comp,{tipo:"Revisão", origem:`IA — repetição espaçada (${n+1}ª revisão)`, dueDate:addDias(REV_INTERVALOS[n]), revN:n}));
    logIA(`Revisão ${n}ª de ${task.comp} feita → próxima agendada para ${new Date(addDias(REV_INTERVALOS[n])+"T12:00").toLocaleDateString("pt-BR")} (${REV_INTERVALOS[n]} dias).`);
  } else {
    logIA(`✅ Ciclo de revisões de ${task.comp} completo (1d→7d→30d→90d) — conteúdo consolidado na memória de longo prazo.`);
  }

  reabastecerBacklog();
  store.save();
}

function renderAreaSel(){
  const sel = document.getElementById("area-sel");
  if(!sel) return;

    `<option value="${k}" ${k===ROOT.current?"selected":""}>${AREAS[k].icone} ${AREAS[k].nome.split("—")[0].trim()}</option>`
  ).join("") + `<option value="__nova">＋ Nova especialização…</option>`;
}

function trocarArea(k){
  if(k==="__nova"){ abrirPickerArea(); return; }
  if(k===ROOT.current){ return; }
  if(!ROOT.areas[k]){ criarAreaRapida(k); return; }  // 1 clique: cria e ativa, sem recadastro
  ROOT.areas[ROOT.current] = S;      // salva a atual
  ROOT.current = k;
  S = ROOT.areas[k];
  // garante plano vivo na área para a qual voltou
  if(S.tasks.filter(t=>t.status==="backlog").length < 3){ reabastecerBacklog(); }
  if(S.tasks.filter(t=>t.status==="hoje").length === 0){ planejarHoje(); }
  store.save();
  toast("🔄 Especialização ativa: " + AREAS[k].nome);
  render("dash");
}

// Cria uma nova especialização em 1 clique, reaproveitando o perfil (nome, prazo, horas).
// Sem re-onboarding: o nível inicial começa no básico e o próprio app faz o score subir.
function criarAreaRapida(k){
  if(ROOT.areas[k]){ ROOT.current=k; S=ROOT.areas[k]; store.save(); renderAreaSel(); render("dash"); return; }
  const area = AREAS[k];
  const base = (ROOT.areas[ROOT.current] && ROOT.areas[ROOT.current].profile) || {};
  if(ROOT.areas[ROOT.current]) ROOT.areas[ROOT.current] = S;   // salva a atual
  const ns = newState();
  ns.onboarded = true;
  ns.profile = {
    area: k,
    nome: ROOT.nome || base.nome || "Você",
    objetivo: "Tornar-se especialista em " + area.nome.split("—")[0].trim(),
    prazo: base.prazo || "6 meses",
    horas: base.horas || 2
  };
  area.comps.forEach(c=>{ ns.comps[c.n] = { score: 5 }; }); // começa do zero — o app faz evoluir
  ROOT.current = k; S = ns; ROOT.areas[k] = ns;
  reabastecerBacklog(); planejarHoje();
  logIA(`Nova especialização "${area.nome}" criada em 1 clique, reaproveitando seu perfil (${ns.profile.horas}h/dia, prazo ${ns.profile.prazo}). Sem recadastro — ajuste horas/prazo quando quiser.`);
  store.save();
  fecharModal(); renderAreaSel();
  toast("🧠 Especialização criada: " + area.nome.split("—")[0].trim());
  render("dash");
}

/* Remove tarefas do formato antigo (genéricas) e substitui por tarefas das trilhas */
function migrarTarefasGenericas(){
  for(const k in ROOT.areas){
    const st = ROOT.areas[k];
    st.provas = st.provas || [];
    if(st.lastAtivo===undefined) st.lastAtivo = null;
    if(!st.lastDia) st.lastDia = null; // força renovação de plano no 1º boot com motor de dias
    // revisões antigas sem data → vencem hoje
    st.tasks.forEach(t=>{ if(t.tipo==="Revisão" && t.status!=="done" && !t.dueDate){ t.dueDate = localDate(); t.revN = t.revN ?? 0; } });
  }
  const genericas = [/^Estudar fundamentos de /, /^Resolver bateria de exercícios/, /^Mini-projeto aplicando /,
    /^Desafio sem tutorial: /, /^Publicar conteúdo sobre /, /^Analisar uso real de /, /^Revisão espaçada: [^(]+$/];
  let removidas = 0;
  const cur = ROOT.current;
  for(const k in ROOT.areas){
    const st = ROOT.areas[k];
    const antes = st.tasks.length;
    st.tasks = st.tasks.filter(t => t.status==="done" || !genericas.some(rx=>rx.test(t.titulo)));
    removidas += antes - st.tasks.length;
  }
  if(removidas > 0){
    S = ROOT.areas[cur];
    reabastecerBacklog();
    planejarHoje();
    logIA(`Atualização de conteúdo: removi ${removidas} tarefa(s) do formato antigo (genéricas) e gerei tarefas específicas das trilhas, com roteiro guiado. Tarefas concluídas foram preservadas.`);
    store.save();
  }
}

function exportarDados(){

function importarDados(input){
  const f = input.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e => {
    try{
      const data = JSON.parse(e.target.result);
      if(!data.areas || !data.current || !data.areas[data.current]) throw 0;
      sanitizarEstado(data);          // fronteira: arquivo de fora nunca traz HTML executável
      data.v = SCHEMA_V;
      ROOT = data; S = ROOT.areas[ROOT.current];
      applyTheme(); store.save();
      document.getElementById("onboard").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");
      renderAreaSel(); render("dash");
      toast("📂 Progresso importado com sucesso!");
    }catch(err){ toast("⚠️ Arquivo inválido — exporte pelo botão 💾 antes."); }
  };
  r.readAsText(f); input.value="";
}

/* nível de carreira */
function scoreGeral(){
  const vals = Object.values(S.comps).map(c=>c.score);
  return vals.length? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : 0;
}
function prontidaoMercado(){
  const area = AREAS[S.profile.area];
  let num=0, den=0;
  area.comps.forEach(c=>{ num += Math.min(scoreDe(c.n),c.m) ; den += c.m; });
  return Math.round(num/den*100);
}
function nivelXP(){ return Math.floor(Math.sqrt(S.xp/100))+1; }

function gerarSprint(t){
  const perg = t.perg || PERG_CAT[t.cat] || [];
  // Bloco final de TODA sprint: transformar o projeto do dia em material de entrevista
  const blocoVenda = {titulo:"Venda & Entrevista: transforme o dia em oferta", tempo:"1h", feito:false, passos:[
    `Pitch de 30 segundos: problema → solução → a decisão técnica mais difícil do dia → resultado com um número ("resposta em X ms", "Y testes", "bundle de Z kB")`,
    `Extraia 3 histórias <b>STAR</b> de hoje (Situação → Tarefa → Ação → Resultado): o bug mais difícil, um trade-off que VOCÊ decidiu, e o que faria diferente. Anote no README, seção "Decisões"`,
    ...perg.map(p=>`Responda EM VOZ ALTA, como numa entrevista: "${p}"`),
    `Grave 2 minutos explicando a arquitetura no celular e assista como se fosse o entrevistador — refaça até soar seguro`,
    `Publique com números: README + post no LinkedIn. Sênior não diz "fiz um CRUD" — diz o problema que resolveu e o que mediu`]};
  // roteiro 100% sob medida da tecnologia? usa direto (ex.: C# + .NET) + bloco de venda
  if(t.blocos) return { tech:t.nome, ico:t.ico, inicio:Date.now(),
    blocos: [...t.blocos.map(b=>({titulo:b.titulo, tempo:b.tempo, feito:false, passos:b.passos})), blocoVenda] };
  // exercícios e roteiro de escala específicos da tecnologia (com fallback genérico)
  const ex  = t.ex  || [
    "Refaça 3 exemplos do guia oficial sem olhar a solução",
    "Adicione validação de entrada e estados de erro ao CRUD",
    "Escreva 3 testes das regras principais"];
  const esc = t.esc || [
    "Reorganize como monorepo: apps/ + packages/",
    "Extraia o domínio para uma lib interna sem dependência de framework",
    "Desenhe como quebraria em serviços/micro-frontends se a escala pedisse"];
  return { tech:t.nome, ico:t.ico, inicio:Date.now(), blocos:[
    {titulo:`Fundamentos de ${t.nome} — aprenda comparando`, tempo:"1h15", feito:false, passos:[
      `Instale o ambiente e crie um projeto vazio de ${t.nome}`,
      `Percorra o <a href="${t.docs}" target="_blank" rel="noopener" style="color:var(--info)">guia oficial de introdução ↗</a> — foque em sintaxe, estrutura de projeto e o "jeito ${t.nome} de pensar"`,
      `Reproduza 3 exemplos do guia DIGITANDO (nada de copiar/colar)`,
      `Técnica sênior: para cada conceito novo, escreva 1 linha "no que eu já domino, isso seria ___" — você constrói pontes, não decoreba`],},
    {titulo:"Núcleo prático: CRUD além do caminho feliz", tempo:"1h45", feito:false, passos:[
      `Comece o projeto do dia: "${t.ideia}"`,
      `Implemente listar + criar + editar + remover com dados locais primeiro`,
      `Agora os caminhos INFELIZES: entrada inválida, item inexistente, ação duplicada — um dev pleno faz o CRUD funcionar; um sênior é medido pelo que acontece quando algo dá errado`,
      `Estruture como faria em produção (pastas, módulos, nomes claros) e faça um commit a cada etapa funcional, com mensagem que explica o PORQUÊ`]},
    {titulo:`Exercícios de fixação — específicos de ${t.nome}`, tempo:"1h", feito:false, passos:ex},
    {titulo:"Dados reais + resiliência", tempo:"1h15", feito:false, passos:[
      `Conecte com ${t.api}`,
      `Trate os 3 estados: carregando, erro e vazio`,
      `Resiliência de gente grande: timeout na chamada + 1 retry com espera — e decida o que o usuário vê se a fonte cair de vez (documente a decisão)`,
      `Adicione uma funcionalidade que só faz sentido com dados reais (busca, filtro ou gráfico)`]},
    {titulo:"Protótipo full stack + qualidade", tempo:"1h15", feito:false, passos:[
      `Construa a ponta que falta (backend simples ou front de consumo)`,
      `Ligue tudo: interface ⇄ API ⇄ persistência — e percorra o fluxo de ponta a ponta`,
      `Escreva 3 testes das regras mais críticas ANTES de seguir (lição 🧪) — é sua rede para o próximo bloco mexer na estrutura`]},
    {titulo:"Escala & Arquitetura: monorepo, libs internas e além", tempo:"1h30", feito:false, passos:[...esc,
      `Feche com um <b>ADR</b> de 10 linhas (Architecture Decision Record): contexto → opções → decisão → consequências. É o documento que entrevistador sênior adora ver no repo`]},
    {titulo:"Deploy + operação mínima", tempo:"45min", feito:false, passos:[
      `Faça o deploy (Vercel, Render, Railway ou Fly.io)`,
      `Operação mínima de produção: endpoint/página de health check + logs estruturados dos erros (lição 🔭 em miniatura)`,
      `README forte: problema, stack, diagrama simples, decisões de arquitetura (link para o ADR), prints e link ao vivo`]},
    blocoVenda
  ]};
}

function iniciarSprint(i){
  S.sprint = gerarSprint(SPRINT_TECHS[i]);
  logIA(`Sprint 1-Dia iniciado: ${S.sprint.tech}. Meta: protótipo full stack publicado no portfólio até o fim do dia (≈10h de blocos guiados, incluindo exercícios específicos e o bloco de Escala & Arquitetura).`);
  store.save(); render("sprint");
}
function concluirBloco(bi){
  const b = S.sprint.blocos[bi];
  b.feito = true; S.xp += 40; S.stats.horas += 1.5;
  if(S.sprint.blocos.every(x=>x.feito)){
    S.xp += 150; S.stats.projetos++;
    (S.sprintsFeitos = S.sprintsFeitos||[]).push({tech:S.sprint.tech, ico:S.sprint.ico, data:new Date().toLocaleDateString("pt-BR")});
    (S.provas = S.provas||[]).push({tipo:"Sprint", titulo:"Protótipo full stack em "+S.sprint.tech+" (1 dia)", comp:S.sprint.tech, link:"", data:new Date().toLocaleDateString("pt-BR")});
    toast("🏆 Prova pública #"+S.provas.length+" registrada: protótipo no portfólio!");
    logIA(`⚡ Sprint concluído: ${S.sprint.tech} — do zero a um protótipo full stack publicado em 1 dia. +350 XP no total. Isso é 1 projeto a mais no portfólio.`);
    toast("🏆 Sprint concluído! +150 XP bônus — projeto no portfólio!");
    S.sprint = null;
  } else {
    toast("✅ Bloco concluído! +40 XP — próximo bloco liberado.");
  }
  store.save(); render("sprint");
}
function cancelarSprint(){
  if(confirm("Abandonar o sprint atual? O progresso dos blocos será perdido.")){ S.sprint=null; store.save(); render("sprint"); }
}

  const feitos = S.sprintsFeitos||[];

    ${SPRINT_CATS.map(cat=>`
    <div class="section-h"><h2>${cat}</h2></div>
    <div class="grid g3">
      ${SPRINT_TECHS.map((t,i)=>({t,i})).filter(x=>x.t.cat===cat).map(({t,i})=>`<div class="card" style="display:flex;flex-direction:column;gap:8px">
        <div style="font-size:15px;font-weight:600">${t.ico} ${t.nome} ${(S.sprintsFeitos||[]).some(f=>f.tech===t.nome)?"🏆":""}</div>

      </div>`).join("")}
    </div>`).join("")}
    ${feitos.length?`<div class="section-h"><h2>🏆 Sprints concluídos (${feitos.length})</h2></div>
    <div class="card">${feitos.map(f=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:13.5px">${f.ico} <b>${f.tech}</b> — protótipo publicado em ${f.data}</div>`).join("")}</div>`:""}`;
  }
  const sp = S.sprint;

  return `<h1 class="page-title">⚡ Sprint: ${sp.ico} ${sp.tech}</h1>
  <p class="page-sub">Progresso: <b style="color:var(--text)">${done}/${sp.blocos.length} blocos</b> — siga em ordem, cada bloco tem o roteiro completo. No fim do dia: projeto no ar e no portfólio.</p>
  <div class="bar-track" style="margin-bottom:18px;height:12px"><div class="bar-fill" style="width:${done/sp.blocos.length*100}%"></div></div>
  ${sp.blocos.map((b,bi)=>{
    const bloqueado = bi>0 && !sp.blocos[bi-1].feito;
    return `<div class="card" style="margin-bottom:12px;${b.feito?'opacity:.55':''}${bloqueado?'opacity:.45':''}">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
        <h3 style="font-size:15px">${b.feito?"✅":bloqueado?"🔒":"▶️"} Bloco ${bi+1}: ${b.titulo} <span class="chip">${b.tempo}</span></h3>
        ${!b.feito && !bloqueado?`<button class="btn btn-p btn-sm" onclick="concluirBloco(${bi})">Concluir bloco (+40 XP)</button>`:""}
      </div>
      <ol style="font-size:13px;color:var(--muted);margin:10px 0 0 18px;line-height:1.8">${b.passos.map(p=>`<li>${p}</li>`).join("")}</ol>
    </div>`;
  }).join("")}
  <button class="btn btn-s btn-sm" onclick="cancelarSprint()">✖ Abandonar sprint</button>`;
}

function moverHoje(id){
  const t = S.tasks.find(x=>x.id===id);
  const usado = S.tasks.filter(x=>x.status==="hoje").reduce((a,x)=>a+x.tempo,0);
  if(usado + t.tempo > S.profile.horas){ toast("⚠️ Estoura o orçamento de "+S.profile.horas+"h/dia. Conclua algo primeiro."); return; }
  t.status="hoje"; store.save(); render(view);
}

/* ---------- Quiz — exercícios com correção automática ---------- */
let qz = null; // {task, comp, qs, idx, hits}
function quizPool(comp, n){
  const bank = QUIZ[S.profile.area]||[];
  const match = bank.filter(q=>q.c===comp).sort(()=>Math.random()-.5);
  const rest  = bank.filter(q=>q.c!==comp).sort(()=>Math.random()-.5);
  return [...match, ...rest].slice(0,n);
}
function abrirQuiz(taskId, comp, n){
  const task = taskId ? S.tasks.find(t=>t.id===taskId) : null;
  qz = { task, comp, qs: quizPool(comp, n||3), idx:0, hits:[] };
  if(!qz.qs.length){ qz=null; return false; }
  renderQuizEstudo();
  document.getElementById("modal-bg").classList.remove("hidden");
  return true;
}
function renderQuizEstudo(){
  // material de estudo: conceitos-chave da competência ANTES das questões
  const bank = (QUIZ[S.profile.area]||[]).filter(q=>q.c===qz.comp);
  const tr = trilhaDe(qz.comp);
  const conceitos = bank.map(q=>q.e);
  document.getElementById("modal").innerHTML = `
    <h2 style="font-size:16px;margin-bottom:4px">📖 Estude antes — ${qz.comp}</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:12px">Leia os conceitos-chave abaixo. As questões do exercício cobram exatamente isso — leia com atenção e depois responda de memória.</p>
    ${tr?`<div style="margin-bottom:10px">${tr.top.map(t=>`<span class="chip acc" style="margin:0 4px 6px 0">${t}</span>`).join("")}</div>`:""}
    <div style="max-height:40vh;overflow-y:auto">
      ${conceitos.length?conceitos.map((c,i)=>`<div class="quiz-exp" style="margin:0 0 8px">💡 ${c}</div>`).join(""):`<div class="quiz-exp">Este exercício usa o banco geral da área — revise os tópicos da trilha acima antes de começar.</div>`}
    </div>
    <div style="margin-top:10px;font-size:12.5px"><b>📚 Aprofunde antes, se quiser:</b><div style="margin-top:6px">${linksHtml(qz.comp,6)}</div></div>
    <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-s" onclick="qz=null;fecharModal()">Sair</button>
      <button class="btn btn-p" onclick="renderQuiz()">✅ Estudei — começar as questões</button>
    </div>`;
}
function renderQuiz(){
  const q = qz.qs[qz.idx];
  document.getElementById("modal").innerHTML = `
    <h2 style="font-size:16px;margin-bottom:4px">🎯 Exercício — ${qz.comp}</h2>
    <p style="color:var(--muted);font-size:12.5px;margin-bottom:12px">Questão ${qz.idx+1} de ${qz.qs.length} · correção automática</p>
    <div class="quiz-prog">${qz.qs.map((_,i)=>`<span class="${i<qz.hits.length?(qz.hits[i]?'hit':'miss'):(i===qz.idx?'cur':'')}"></span>`).join("")}</div>
    <p style="font-weight:600;font-size:15px;line-height:1.5;margin-bottom:14px">${q.q}</p>
    <div id="qz-opts">${q.o.map((o,i)=>`<button class="quiz-opt" onclick="responderQuiz(${i})">${String.fromCharCode(65+i)}) ${o}</button>`).join("")}</div>
    <div id="qz-after"></div>
    <div style="margin-top:8px;text-align:right"><button class="btn btn-s btn-sm" onclick="qz=null;fecharModal()">Sair</button></div>`;
}
function responderQuiz(i){
  const q = qz.qs[qz.idx];
  const certo = i===q.a;
  qz.hits.push(certo);
  document.querySelectorAll("#qz-opts .quiz-opt").forEach((b,bi)=>{
    b.disabled = true;
    if(bi===q.a) b.classList.add("certo");
    else if(bi===i) b.classList.add("errado");
  });
  document.getElementById("qz-after").innerHTML = `
    <div class="quiz-exp">${certo?"✅ Correto! ":"❌ Não foi dessa vez. "}${q.e}</div>
    <div style="text-align:right"><button class="btn btn-p" onclick="proximaQuiz()">${qz.idx+1<qz.qs.length?"Próxima →":"Ver resultado"}</button></div>`;
}
function proximaQuiz(){
  qz.idx++;
  if(qz.idx < qz.qs.length) renderQuiz();
  else finalizarQuiz();
}
function finalizarQuiz(){
  const acertos = qz.hits.filter(Boolean).length, total = qz.qs.length;
  const pct = acertos/total;
  const rating = pct>=1?5 : pct>=0.67?4 : pct>=0.5?3 : pct>0?2 : 1;
  const m = document.getElementById("modal");
  if(qz.task){
    m.innerHTML = `<h2 style="font-size:18px;margin-bottom:6px">${pct>=0.67?"🎉":"📚"} Resultado: ${acertos}/${total} acertos</h2>
      <p style="color:var(--muted);font-size:13.5px;line-height:1.5;margin-bottom:10px">A IA converteu em desempenho: <b style="color:var(--text)">${RATINGS[rating-1]}</b>. O score de <b style="color:var(--text)">${qz.task.comp}</b> será ajustado e o plano adaptado automaticamente.</p>
      <label class="field-lbl">Quer registrar o que aprendeu? (opcional)</label>
      <textarea id="qz-evid" placeholder="Anote o que fixou ou onde errou..."></textarea>
      <div style="margin-top:16px;text-align:right"><button class="btn btn-p" onclick="concluirViaQuiz(${rating},${acertos},${total})">Concluir tarefa</button></div>`;
  } else {
    const c = S.comps[qz.comp];
    const delta = acertos*2 - (total-acertos);
    if(c){ c.score = Math.max(0, Math.min(100, c.score + delta)); }
    S.xp += acertos*10;
    logIA(`Treino livre de ${qz.comp}: ${acertos}/${total} acertos → score ajustado em ${delta>=0?"+":""}${delta} (agora ${scoreDe(qz.comp)}%), +${acertos*10} XP.`);
    store.save();
    const compFix = qz.comp;
    m.innerHTML = `<h2 style="font-size:18px;margin-bottom:6px">${pct>=0.67?"🎉":"📚"} ${acertos}/${total} acertos — +${acertos*10} XP</h2>
      <p style="color:var(--muted);font-size:13.5px;line-height:1.5">Score de <b style="color:var(--text)">${compFix}</b>: ${scoreDe(compFix)}% (${delta>=0?"+":""}${delta}).${pct<0.67?" A IA recomenda revisar o conteúdo antes de tentar de novo.":""}</p>
      <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-s" onclick="qz=null;fecharModal();render(view)">Fechar</button>
        <button class="btn btn-p" onclick="abrirQuiz(null,'${compFix.replace(/'/g,"\\'")}',4)">🔁 Praticar de novo</button>
      </div>`;
  }
}
function concluirViaQuiz(rating, acertos, total){
  const ev = "Quiz: "+acertos+"/"+total+" acertos. " + (document.getElementById("qz-evid")?.value||"");
  concluirTarefa(qz.task, rating, ev, acertos===total);
  qz = null;
  fecharModal(); render(view);
}

function setRating(r){ avalRating=r; RATINGS.forEach((_,i)=>document.getElementById("rb"+i).classList.toggle("sel",i===r-1)); }
function fecharModal(){ document.getElementById("modal-bg").classList.add("hidden"); }
function confirmarAvaliacao(){

/* ---------- Carreira & Mercado ---------- */
function vCarreira(){
  const area = AREAS[S.profile.area];
  const sg = scoreGeral(), pm = prontidaoMercado();
  const trilhaIdx = sg<35?0:sg<60?1:sg<82?2:3;
  const gaps = area.comps.map(c=>({...c, s:scoreDe(c.n), gap:Math.max(0,c.m-scoreDe(c.n))})).sort((a,b)=>b.gap-a.gap);
  const topGap = gaps[0];
  return `<h1 class="page-title">💼 Carreira & Mercado</h1>
  <p class="page-sub">A IA cruza suas competências com a demanda de ${area.vagas.toLocaleString("pt-BR")} vagas analisadas (simulação) e mostra o caminho até o próximo nível.</p>
  <div class="grid g3">
    <div class="card kpi"><div class="lbl">Prontidão p/ mercado</div><div class="val">${pm}%</div><div class="sub">cobre a demanda média das vagas</div></div>
    <div class="card kpi"><div class="lbl">Nível de carreira</div><div class="val">${area.trilha[trilhaIdx]}</div><div class="sub">próximo: ${area.trilha[Math.min(trilhaIdx+1,3)]}</div></div>
    <div class="card kpi"><div class="lbl">Maior gap agora</div><div class="val" style="font-size:19px">${topGap.n}</div><div class="sub">demanda ${topGap.m}% vs. você ${topGap.s}%</div></div>
  </div>

  <div class="section-h"><h2>📊 Demanda do mercado × você</h2><span class="chip">ordenado por gap de impacto</span></div>
  <div class="card">
    ${gaps.map(g=>`
      <div class="gap-pill">
        <div style="width:150px;font-size:13.5px">${g.n}</div>
        <div style="flex:1">
          <div class="bar-track" style="margin-bottom:3px"><div class="bar-fill" style="width:${g.m}%;background:var(--panel2);border:1px solid var(--border)"></div></div>
          <div class="bar-track"><div class="bar-fill" style="width:${g.s}%"></div></div>
        </div>
        <div style="width:130px;text-align:right;font-size:12.5px;color:var(--muted)">mercado ${g.m}% · você ${g.s}%</div>
        ${g.gap>10?`<button class="btn btn-s btn-sm" onclick="addGapTask('${g.n}')">+ treinar</button>`:`<span class="chip ok">ok</span>`}
      </div>`).join("")}
  </div>

  <div class="section-h"><h2>🧭 Trilha de carreira — ${area.cargoBase}</h2></div>
  <div class="card" style="display:flex;gap:8px;flex-wrap:wrap">
    ${area.trilha.map((n,i)=>`<div style="flex:1;min-width:140px;text-align:center;padding:14px 8px;border-radius:12px;border:1.5px solid ${i===trilhaIdx?'var(--accent)':'var(--border)'};background:${i<trilhaIdx?'rgba(34,197,94,.08)':i===trilhaIdx?'rgba(99,102,241,.10)':'var(--panel2)'}">
      <div style="font-size:20px;margin-bottom:4px">${i<trilhaIdx?'✅':i===trilhaIdx?'📍':'🔒'}</div>
      <b style="font-size:13.5px">${n}</b>
      <div style="font-size:11.5px;color:var(--muted);margin-top:3px">${i<trilhaIdx?'concluído':i===trilhaIdx?'você está aqui':'score geral ≥ '+[35,60,82,95][i]+'%'}</div>
    </div>`).join("")}
  </div>

  <div class="section-h"><h2>🤖 Recomendações da IA para o objetivo "${S.profile.objetivo}"</h2></div>
  <div class="card">
    ${gaps.slice(0,3).map(g=>`<div style="padding:10px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:12px">
      <div style="font-size:13.5px;line-height:1.5">Priorize <b>${g.n}</b> — está em ${g.s}% e aparece em ${g.m}% das vagas. Fechar esse gap é o movimento de maior impacto para "${S.profile.objetivo}".</div>
      <button class="btn btn-p btn-sm" onclick="addGapTask('${g.n}')">Adicionar ao plano</button>
    </div>`).join("")}
  </div>`;
}

function addGapTask(comp){
  const t = gerarTarefa(comp,{origem:"IA — recomendação de carreira (gap × demanda de mercado)"});
  S.tasks.push(t);
  logIA(`Recomendação de carreira aceita: criei "${t.titulo}" para fechar o gap de ${comp} (alta demanda nas vagas).`);
  store.save(); toast("✅ Tarefa adicionada ao backlog: "+t.titulo);
  render(view);
}

  quando:"APIs e apps web server-side, CRUDs tradicionais.", pro:"Simples, difundido, separa dados de tela.", contra:"Controllers viram 'God objects'; a fronteira View↔Controller confunde.",
  teoria:`<p><b>Model</b> guarda dados e regras. <b>View</b> mostra. <b>Controller</b> recebe a requisição do usuário, orquestra o model e devolve a view. O fluxo é triangular: usuário → Controller → Model → View → usuário.</p>`,
  diagrama:`  Usuário
    │ (ação: POST /tarefas)
    ▼
┌──────────┐  usa   ┌────────┐
│Controller│ ─────▶ │ Model  │  (dados + regras)
└────┬─────┘        └────────┘
     │ escolhe/renderiza
     ▼
┌────────┐
│  View  │ ──▶ Usuário`,
  pratica:`Refaça o CRUD deste app em MVC explícito: <code>TarefaModel</code> (dados), <code>tarefas.view</code> (HTML) e <code>TarefaController</code> (criar/listar/editar/excluir). Regra: a View NUNCA fala com o Model direto — só via Controller.`},
{ id:"mvp", cat:"🎨 UI & Apresentação", nome:"MVP — Model-View-Presenter", tag:"Testável",
  resumo:"A View é burra e passiva; o Presenter faz TODA a lógica e manda a View exibir. Ótimo para testar sem UI.",
  quando:"Android clássico, WinForms, apps onde você quer testar a lógica de tela sem renderizar.", pro:"Presenter testável sem framework de UI; View trivial.", contra:"Muito código de 'ligação' (View↔Presenter); Presenter incha.",
  teoria:`<p>Diferente do MVC, a <b>View</b> não decide nada: ela expõe uma interface (mostrarLista, mostrarErro) e repassa eventos ao <b>Presenter</b>, que contém a lógica e comanda a View. Como a View é uma interface, você testa o Presenter com uma View falsa.</p>`,
  diagrama:`┌────────┐  evento   ┌───────────┐  lê/grava  ┌────────┐
│  View  │ ────────▶ │ Presenter │ ─────────▶ │ Model  │
│(passiva)│ ◀──────── │ (lógica)  │            └────────┘
└────────┘ comanda   └───────────┘
  (View implementa uma INTERFACE → testável com mock)`,
  pratica:`Crie <code>interface TarefaView { render(lista); showError(msg) }</code>. O <code>TarefaPresenter</code> recebe essa interface e faz a lógica. Escreva um teste passando uma View falsa e verificando que <code>render</code> foi chamado com a lista certa — sem tela nenhuma.`},
{ id:"mvvm", cat:"🎨 UI & Apresentação", nome:"MVVM — Model-View-ViewModel", tag:"Data binding",
  resumo:"A View se liga (binding) ao ViewModel; mudou o dado, a tela muda sozinha. Coração de Angular, Vue, WPF, SwiftUI, Compose.",
  quando:"UIs reativas modernas com two-way/one-way binding.", pro:"Menos código de ligação manual; testar o ViewModel é fácil.", contra:"Binding 'mágico' esconde bugs; ViewModel pode virar depósito de tudo.",
  teoria:`<p>O <b>ViewModel</b> expõe estado observável e comandos. A <b>View</b> se <i>liga</i> a esse estado: quando o estado muda, a tela re-renderiza sem você mexer no DOM. É o padrão estado→render deste app com binding automático. Signals (Angular), ref (Vue), @State (SwiftUI) e StateFlow (Compose) são o ViewModel na prática.</p>`,
  diagrama:`┌────────┐  binding (observa estado)  ┌───────────┐
│  View  │ ◀════════════════════════▶ │ ViewModel │
└────────┘  comandos (chama ações)    └─────┬─────┘
   ▲ re-render automático                   │ usa
   │ quando o estado muda                   ▼
                                        ┌────────┐
                                        │ Model  │
                                        └────────┘`,
  pratica:`Implemente um contador em MVVM: <code>ContadorViewModel</code> com um estado observável (signal/ref/useState) e o método <code>incrementar()</code>. A View só faz binding no valor e chama o comando — nada de manipular a tela na mão. Depois teste o ViewModel isolado (incrementar 3× → valor 3), sem UI.`},
{ id:"mvi", cat:"🎨 UI & Apresentação", nome:"MVI / Redux — fluxo unidirecional", tag:"Estado previsível",
  resumo:"Estado imutável + ações que geram um novo estado via função pura (reducer). Redux, MVI (Android), Elm.",
  quando:"Apps com estado complexo onde previsibilidade e time-travel importam.", pro:"Fluxo único e previsível; fácil de depurar e testar.", contra:"Muito boilerplate para casos simples.",
  teoria:`<p>Um só fluxo: a UI dispara uma <b>Intent/Action</b> → o <b>reducer</b> (função pura) recebe estado atual + ação e devolve um <b>novo estado</b> → a View re-renderiza. Estado nunca é mutado no lugar. É o <code>useReducer</code> da lição de React, elevado a arquitetura.</p>`,
  diagrama:`   Action ──▶ ┌─────────┐ ──▶ novo State ──▶ ┌──────┐
              │ Reducer │                    │ View │
   ▲          │ (pura)  │                    └──┬───┘
   │          └─────────┘                       │
   └───────────── dispatch(Action) ◀────────────┘  (loop unidirecional)`,
  pratica:`Modele um carrinho com estado <code>{itens:[]}</code> e um reducer puro tratando <code>ADD</code>, <code>REMOVE</code>, <code>CLEAR</code>. Regra de ouro: o reducer nunca muda o estado recebido — sempre retorna um objeto novo. Escreva 3 testes do reducer (entrada→saída).`},
/* ---- Aplicação / Domínio ---- */
{ id:"layered", cat:"🧱 Aplicação & Domínio", nome:"Layered / N-Tier (em camadas)", tag:"Fundamental",
  resumo:"Camadas empilhadas: Apresentação → Aplicação → Domínio → Infraestrutura. Cada uma só conhece a de baixo.",
  quando:"A maioria dos sistemas corporativos; ponto de partida seguro.", pro:"Organização óbvia, separação por responsabilidade.", contra:"Vira 'lasanha' com regras vazando; a camada de dados no fundo acopla tudo.",
  teoria:`<p>O sistema é fatiado horizontalmente. Uma requisição desce pelas camadas: a <b>Apresentação</b> chama a <b>Aplicação</b> (casos de uso), que usa o <b>Domínio</b> (regras), que é persistido pela <b>Infraestrutura</b>. Regra: uma camada só depende da imediatamente inferior.</p>`,
  diagrama:`┌─────────────────────┐
│    Apresentação     │  (UI, controllers)
├─────────────────────┤
│     Aplicação       │  (casos de uso)
├─────────────────────┤
│      Domínio        │  (entidades, regras)
├─────────────────────┤
│   Infraestrutura    │  (banco, APIs externas)
└─────────────────────┘  ▼ dependência desce`,
  pratica:`Organize seu CRUD em 4 pastas (presentation/application/domain/infra). Prove a regra: tente importar o banco (infra) dentro do domínio — e então NÃO faça isso. O domínio deve rodar sem saber se o banco é SQLite ou Postgres.`},
{ id:"hexagonal", cat:"🧱 Aplicação & Domínio", nome:"Hexagonal — Ports & Adapters", tag:"Testável",
  resumo:"Domínio no centro, isolado; o mundo externo se conecta por portas (interfaces) e adaptadores. Troque banco/UI sem tocar a regra.",
  quando:"Quando você quer trocar tecnologia (banco, fila, UI) sem reescrever regra.", pro:"Domínio testável e independente; adaptadores plugáveis.", contra:"Mais interfaces/arquivos; overkill para CRUD trivial.",
  teoria:`<p>O <b>domínio</b> define <b>portas</b> (interfaces do que ele precisa: <code>RepositorioTarefas</code>). <b>Adaptadores</b> implementam essas portas para uma tecnologia concreta (Postgres, memória, REST). O domínio nunca importa infraestrutura — a dependência aponta para DENTRO. Já tem uma lição disso no guia Construir e um sprint dedicado.</p>`,
  diagrama:`        Adaptadores (fora)          Portas   Domínio (dentro)
   REST ─┐                          ┌─▶ ┌──────────────┐
   CLI  ─┼─▶ [porta de entrada] ────┘   │   Regras de  │
         │                              │   negócio    │
   Postgres ◀── [porta de saída] ◀──────│  (puro)      │
   InMemory ◀──                         └──────────────┘`,
  pratica:`Defina <code>interface RepositorioTarefas { salvar(t); listar() }</code> no domínio. Faça 2 adaptadores: <code>RepoMemoria</code> e <code>RepoSQLite</code>. Rode os MESMOS testes do domínio contra os dois — se passam nos dois, seu domínio está de fato isolado.`},
{ id:"clean", cat:"🧱 Aplicação & Domínio", nome:"Clean Architecture", tag:"Regra da dependência",
  resumo:"Círculos concêntricos; dependência sempre aponta para dentro (entidades). Detalhes (UI, banco, framework) ficam na borda.",
  quando:"Sistemas de vida longa, times grandes, regra de negócio valiosa.", pro:"Núcleo blindado contra mudança de framework/banco.", contra:"Muita cerimônia (interfaces, use cases, DTOs) para apps pequenos.",
  teoria:`<p>Quatro anéis: <b>Entidades</b> (regras corporativas) → <b>Casos de Uso</b> (regras da aplicação) → <b>Adaptadores</b> (controllers, presenters) → <b>Frameworks & Drivers</b> (UI, banco). A <b>Regra da Dependência</b>: o código de um anel só pode conhecer os anéis mais internos. Framework e banco são 'detalhes' plugáveis.</p>`,
  diagrama:`      ╭───────────────────────────╮
      │   Frameworks & Drivers     │  (UI, DB, web)
      │  ╭─────────────────────╮   │
      │  │ Adaptadores (I/O)   │   │
      │  │ ╭─────────────────╮ │   │
      │  │ │  Casos de Uso   │ │   │
      │  │ │ ╭─────────────╮ │ │   │
      │  │ │ │  Entidades  │ │ │   │  ◀── dependência
      │  │ │ ╰─────────────╯ │ │   │      aponta p/ dentro
      │  │ ╰─────────────────╯ │   │
      │  ╰─────────────────────╯   │
      ╰───────────────────────────╯`,
  pratica:`Refatore o projeto RAG (aba Projetos) em Clean: <code>Entidade</code> Documento; <code>CasoDeUso</code> ResponderPergunta (recebe portas de busca e de LLM); adaptadores para o vector DB e o provedor de LLM. Troque o LLM sem tocar o caso de uso.`},
{ id:"cqrs", cat:"🧱 Aplicação & Domínio", nome:"CQRS + Event Sourcing", tag:"Avançado",
  resumo:"Separar escrita (comandos) de leitura (queries), com modelos próprios. Event Sourcing guarda os eventos, não o estado final.",
  quando:"Leitura e escrita com escalas/formas muito diferentes; auditoria total.", pro:"Escala leitura e escrita separadamente; histórico completo.", contra:"Complexidade alta, consistência eventual, curva íngreme.",
  teoria:`<p><b>CQRS</b>: o lado de <b>comando</b> (escrever) tem um modelo rico com regras; o lado de <b>query</b> (ler) tem modelos achatados, otimizados para telas. <b>Event Sourcing</b>: em vez de salvar o estado atual, você salva a sequência de <b>eventos</b> (TarefaCriada, TarefaConcluída) — o estado é a soma deles. Dá auditoria e 'viagem no tempo'.</p>`,
  diagrama:`  Comando ─▶ [Modelo de Escrita] ─▶ Evento ─▶ (event store)
                                         │
                                         ▼ projeta
  Query   ◀─ [Modelo de Leitura] ◀── (view materializada)`,
  pratica:`No app: em vez de <code>task.status='done'</code>, grave um evento <code>TarefaConcluida{id,ts}</code> num array. Monte a lista atual 'tocando' os eventos em ordem. Depois crie uma view de leitura (contagem por dia) atualizada a cada evento.`},

{ id:"monolito", cat:"🌐 Sistemas & Escala", nome:"Monólito Modular", tag:"Comece aqui",

{ id:"microservicos", cat:"🌐 Sistemas & Escala", nome:"Microsserviços", tag:"Distribuído",

  teoria:`<p>Cada <b>bounded context</b> (DDD) vira um serviço com seu próprio banco e deploy. Eles conversam por HTTP/gRPC ou por <b>eventos</b>. A regra dura: um serviço nunca lê o banco do outro — só via API/evento. Já existe um sprint dedicado a isso.</p>`,

{ id:"eda", cat:"🌐 Sistemas & Escala", nome:"Event-Driven Architecture (EDA)", tag:"Assíncrono",

  teoria:`<p>Quem gera não sabe quem consome: o <b>produtor</b> publica um evento num <b>broker</b> (RabbitMQ, Kafka, SQS); um ou mais <b>consumidores</b> reagem. Adicionar comportamento = adicionar um consumidor, sem tocar o produtor. Como filas entregam 'pelo menos uma vez', o consumidor precisa ser idempotente.</p>`,

function arqMap(){ if(!ROOT.arqs) ROOT.arqs = {}; return ROOT.arqs; }
function abrirArq(id){ arqAberta = id; render("arqs"); window.scrollTo(0,0); }
function concluirArq(id){
  const a = arqMap();
  if(!a[id]){ a[id]=1; S.xp += 15; toast("🏛️ Arquitetura estudada! +15 XP"); }
  store.save(); arqAberta=null; render("arqs"); window.scrollTo(0,0);
}

function vArqs(){
  const a = arqMap(), feitos = Object.keys(a).length;
  const cats = [...new Set(ARQUITETURAS.map(x=>x.cat))];
  return `<h1 class="page-title">🏛️ Arquiteturas de Software</h1>
  <p class="page-sub">Teoria + prática dos padrões que caem em entrevista e definem projetos: dos de UI (MVC, MVP, MVVM, MVI) aos de aplicação (Layered, Hexagonal, Clean, CQRS) e de sistemas (monólito, microsserviços, EDA, serverless, micro-frontends). Cada um tem diagrama, quando usar, prós/contras e um exercício no seu próprio app. <b>${feitos}/${ARQUITETURAS.length} estudadas</b> · +15 XP cada.</p>
  <progress max="${ARQUITETURAS.length}" value="${feitos}" style="margin-bottom:12px"></progress>
  ${cats.map(cat=>`
    <div class="section-h"><h2>${cat}</h2></div>
    <div class="lesson-grid">
    ${ARQUITETURAS.filter(x=>x.cat===cat).map(x=>{
      const feito = !!a[x.id];
      return `<div class="card lesson-card ${feito?"done":""}" onclick="abrirArq('${x.id}')">
        <h3 style="margin:0 0 4px;font-size:14px">${x.nome} ${feito?"✅":""}</h3>
        <p style="color:var(--muted);font-size:12.3px;line-height:1.5">${x.resumo}</p>
        <div style="margin-top:8px"><span class="chip acc">${x.tag}</span></div>
      </div>`;
    }).join("")}
    </div>`).join("")}`;
}

function vArq(id){
  const x = ARQUITETURAS.find(a=>a.id===id);
  if(!x){ arqAberta=null; return vArqs(); }
  const feito = !!arqMap()[x.id];
  return `<button class="btn btn-s btn-sm" onclick="arqAberta=null;render('arqs');window.scrollTo(0,0)">← Todas as arquiteturas</button>
  <h1 class="page-title" style="margin-top:14px">🏛️ ${x.nome}</h1>
  <p class="page-sub"><span class="chip acc">${x.tag}</span> <span class="chip">${x.cat}</span></p>
  <div class="card lesson-body">
    <h3>📖 Teoria</h3>${x.teoria}
    <h3>🗺️ Diagrama</h3>
    <pre class="code">${x.diagrama}</pre>
    <h3>✅ Quando usar</h3><p>${x.quando}</p>
    <div class="grid g2" style="margin-top:6px">
      <div style="background:var(--panel2);border-radius:8px;padding:10px 12px"><b style="color:var(--ok)">👍 Prós</b><p style="margin-top:4px">${x.pro}</p></div>
      <div style="background:var(--panel2);border-radius:8px;padding:10px 12px"><b style="color:var(--bad)">👎 Contras</b><p style="margin-top:4px">${x.contra}</p></div>
    </div>
    <div class="desafio" style="margin-top:14px">🛠️ <b>Exercício prático:</b> ${x.pratica}</div>
    <p style="margin-top:12px"><a href="https://www.youtube.com/results?search_query=${encodeURIComponent(x.nome.split("—")[0]+" arquitetura explicação")}" target="_blank" rel="noopener" style="color:var(--info)">📺 Ver no YouTube ↗</a></p>
  </div>
  <button class="btn btn-p btn-sm" onclick="concluirArq('${x.id}')" style="margin-top:14px">${feito?"✔ Estudada — voltar":"✅ Marcar como estudada (+15 XP)"}</button>`;
}

function projMap(){ if(!ROOT.proj) ROOT.proj = {}; return ROOT.proj; }
function abrirProjeto(id){ projetoAberto = id; render("projetos"); window.scrollTo(0,0); }
function togglePasso(pid, i){
  const k = pid+"|"+i, p = projMap();
  if(p[k]) delete p[k]; else { p[k]=1; S.xp += 8; }
  store.save(); render("projetos");
}
function projFeitos(pid){ const p = projMap(); return Object.keys(p).filter(k=>k.startsWith(pid+"|")).length; }

function vProjetos(){
  const totalPassos = PROJETOS.reduce((s,p)=>s+p.passos.length,0);
  const feitos = Object.keys(projMap()).length;
  return `<h1 class="page-title">🚀 Projetos de IA — passo a passo</h1>
  <p class="page-sub">A trilha de projetos da Engenharia de IA Aplicada, do primeiro app ao capstone publicado. Cada projeto tem passos numerados que você marca conforme avança — do zero a um portfólio que vende. <b>${feitos}/${totalPassos} passos concluídos</b> · +8 XP por passo.</p>
  <progress max="${totalPassos}" value="${feitos}" style="margin-bottom:12px"></progress>
  ${["1 · Fundamentos","2 · Sistemas","3 · Produção","3 · Capstone"].filter((v,i,a)=>a.indexOf(v)===i).map(nv=>`
    <div class="section-h"><h2>${nv}</h2></div>
    <div class="lesson-grid">
    ${PROJETOS.filter(p=>p.nivel===nv).map(p=>{
      const f = projFeitos(p.id), done = f===p.passos.length;
      return `<div class="card lesson-card ${done?"done":""}" onclick="abrirProjeto('${p.id}')">
        <div style="font-size:22px">${p.ico}</div>
        <h3 style="margin:6px 0 4px;font-size:14.5px">${p.titulo} ${done?"🏆":""}</h3>
        <p style="color:var(--muted);font-size:12.5px;line-height:1.5">${p.objetivo}</p>
        <div style="margin-top:8px"><span class="chip">${p.modulo}</span></div>
        <div class="bar-track" style="margin-top:8px"><div class="bar-fill" style="width:${f/p.passos.length*100}%"></div></div>
        <div style="font-size:11.5px;color:var(--muted);margin-top:4px">${f}/${p.passos.length} passos</div>
      </div>`;
    }).join("")}
    </div>`).join("")}`;
}

function vProjeto(id){
  const p = PROJETOS.find(x=>x.id===id);

  const pm = projMap(), f = projFeitos(p.id), done = f===p.passos.length;
  return `<button class="btn btn-s btn-sm" onclick="projetoAberto=null;render('projetos');window.scrollTo(0,0)">← Todos os projetos</button>
  <h1 class="page-title" style="margin-top:14px">${p.ico} ${p.titulo}</h1>

  <div class="card lesson-body">

    const feito = !!pm[p.id+"|"+i];
    return `<div class="card" style="margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;${feito?"opacity:.6":""}">

  ${done?`<div class="desafio" style="margin-top:12px">🏆 <b>Projeto concluído!</b> Publique no GitHub, grave o vídeo e adicione ao portfólio. Depois vá para o próximo.</div>`:""}`;
}

// fallback: tecnologias sem leituras curadas ganham roteiro do guia oficial + exercícios da sprint
function leiturasDe(t){
  if(LEITURAS[t.nome]) return LEITURAS[t.nome];
  const base = [{c:"Guia oficial de "+t.nome, o:"Comece pelo guia de introdução: estrutura de projeto, conceitos centrais e o 'jeito "+t.nome+"' de resolver problemas.", l:t.docs, ex:"Reproduza 2 exemplos do guia digitando, sem copiar/colar."}];
  (t.ex||[]).forEach((e,i)=>base.push({c:"Prática guiada "+(i+1)+" — "+t.nome, o:"Exercício de fixação específico desta tecnologia (mesmo do bloco 3 da sprint).", l:t.docs, ex:e}));
  return base;
}

function readsMap(){ if(!ROOT.reads) ROOT.reads = {}; return ROOT.reads; }
function abrirLeitura(nome){ leituraAberta = nome; render("leituras"); window.scrollTo(0,0); }
function toggleLeitura(tech, c){
  const k = tech+"|"+c, r = readsMap();
  if(r[k]) delete r[k];
  else { r[k] = 1; S.xp += 10; toast("📚 Leitura concluída! +10 XP"); }
  store.save(); render("leituras");
}

function vLeituras(){
  const r = readsMap();
  const totalLidas = Object.keys(r).length;
  return `<h1 class="page-title">📚 Leituras Técnicas</h1>

  ${SPRINT_CATS.map(cat=>`
    <div class="section-h"><h2>${cat}</h2></div>
    <div class="lesson-grid">
    ${SPRINT_TECHS.filter(t=>t.cat===cat).map(t=>{
      const itens = leiturasDe(t);
      const lidas = itens.filter(i=>r[t.nome+"|"+i.c]).length;
      return `<div class="card lesson-card ${lidas===itens.length?"done":""}" onclick="abrirLeitura('${t.nome.replace(/'/g,"\\'")}')">

    }).join("")}
    </div>`).join("")}`;
}

<p>A técnica central deste app: transformar um array em HTML usando <b>template literals</b> — textos entre crases (\`) que aceitam <code>\${expressão}</code> no meio.</p>
<h3>💻 Código: um CRUD completo na tela</h3>
<pre class="code">&lt;input id="novo" placeholder="Nova tarefa"&gt;

<h3>💻 Código: as 4 funções de data deste app (reais)</h3>
<pre class="code">// Hoje como "AAAA-MM-DD" no fuso LOCAL do usuário
function localDate(d){
  const x = d ? new Date(d) : new Date();
  return x.getFullYear() + "-" +
         String(x.getMonth()+1).padStart(2,"0") + "-" +  // meses começam em 0!
         String(x.getDate()).padStart(2,"0");
}

// Data daqui a N dias (setDate resolve viradas de mês sozinho)
function addDias(n){
  const d = new Date();
  d.setDate(d.getDate() + n);
  return localDate(d);
}

// Diferença em dias entre duas datas-texto.
// O "T12:00" é a defesa anti-fuso: ancorar ao MEIO-DIA garante
// que horário de verão nunca mude o dia do cálculo.
function diffDias(a, b){
  return Math.round((new Date(b+"T12:00") - new Date(a+"T12:00")) / 86400000);
}                                            // 86400000 ms = 1 dia

// O MOTOR DE DIAS: compara o último dia visto com hoje
function checarNovoDia(){
  const hoje = localDate();
  if(S.lastDay !== hoje){       // o dia virou desde a última visita!
    S.lastDay = hoje;
    replanejarDia();            // tarefas voltam, revisões vencidas entram
    return true;
  }
  return false;
}
// No BOOT: roda ao abrir + a cada 60s (pega a meia-noite com o app aberto)
// setInterval(() =&gt; { if(checarNovoDia()) render(view); }, 60000);</pre>
<p>Duas armadilhas clássicas evitadas aqui: <code>getMonth()</code> devolve 0–11 (janeiro é 0), e <code>new Date("2026-07-09")</code> sem hora é interpretado como <b>UTC</b> — no Brasil isso vira 21h do dia <b>anterior</b>. Daí o truque do meio-dia.</p>
<div class="onde">🔍 <b>Onde está neste app:</b> busque <code>localDate</code>, <code>diffDias</code>, <code>labelDue</code> (gera "amanhã" / "vencida há 2d") e <code>checarNovoDia</code>. No BOOT, veja o <code>setInterval</code> de 60 segundos.</div>

<h3>💻 Código: o agendador deste app (real, simplificado)</h3>
<pre class="code">const REV_INTERVALOS = [1, 7, 30, 90];   // dias entre revisões

{ id:"gamificacao", nivel:"Avançado", ico:"🏅", min:25,

  resumo:"A matemática por trás de níveis que ficam mais caros e streaks que quebram de verdade.",
  corpo:`
<h3>🎯 O que você vai aprender</h3>
<ul>
  <li>Sistema de <b>XP</b> ancorado em eventos do CRUD</li>
  <li>Por que a fórmula de nível usa <b>raiz quadrada</b></li>
  <li>Streak honesto: conta dias <b>consecutivos</b> e quebra de verdade</li>
</ul>
<h3>📖 Conceito</h3>
<p>Gamificação séria não é enfeite: é dar recompensas em cima de eventos que o app já registra. Cada "escreva no estado" (concluir tarefa, acertar quiz, fechar sprint) vira uma oportunidade de <code>S.xp += algo</code>.</p>
<h3>💻 Código</h3>
<pre class="code">// NÍVEL: sqrt faz cada nível custar mais que o anterior
// nível 2 = 100 XP · nível 3 = 400 · nível 4 = 900 · nível 5 = 1600
function nivelXP(){
  return Math.floor(Math.sqrt(S.xp / 100)) + 1;
}
// Progressão linear vicia rápido e cansa rápido;
// custo crescente mantém o "quase lá" sempre vivo.

// STREAK: ao concluir a PRIMEIRA tarefa do dia
function atualizarStreak(){
  const hoje = localDate();
  if(S.streakDay === hoje) return;          // já contou hoje

  const gap = S.streakDay ? diffDias(S.streakDay, hoje) : null;

  if(gap === 1)      S.streak += 1;         // dia consecutivo 🔥
  else if(gap >= 2){                        // 2+ dias parado: quebra
    logIA("Streak quebrado após " + S.streak +
          " dias — constância vale mais que intensidade. Recomece hoje.");
    S.streak = 1;
  }
  else if(gap === null) S.streak = 1;       // primeiro dia de todos

  S.streakDay = hoje;
  store.save();
}</pre>
<p>O detalhe que separa isso de um contador ingênuo: o streak usa <code>diffDias</code> real, então fechar o app por uma semana quebra a sequência <b>mesmo que ninguém abra o app nesse meio-tempo</b> — a verdade está nos dados, não na presença.</p>

  <li>Como a "IA" deste app funciona (regras + score) e seus limites</li>

  <li>O mapa do próximo nível: backend, REST e frameworks</li>
</ul>
<h3>📖 Conceito</h3>
<p>A "IA" deste app é <b>heurística</b>: regras determinísticas sobre os dados (score baixo → tarefas mais fáceis; revisão vencida → prioridade). Isso é honesto e roda offline, mas não entende texto livre. Para corrigir uma resposta dissertativa, é preciso chamar um modelo de linguagem por <b>API</b> — pedir um serviço externo via internet.</p>
<h3>💻 Código: chamando um LLM com fetch</h3>
<pre class="code">// async/await: pausar a função enquanto a resposta não chega,
// sem congelar a tela
async function corrigirComIA(pergunta, respostaDoAluno){
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",                          // POST = enviar dados
    headers: {
      "content-type": "application/json",
      "x-api-key": SUA_CHAVE                 // NUNCA num arquivo público!
    },
    body: JSON.stringify({
      model: "claude-sonnet-5",
      max_tokens: 500,
      messages: [{ role: "user",
        content: "Corrija como um mentor: Pergunta: " + pergunta +
                 " Resposta do aluno: " + respostaDoAluno }]
    })
  });
  if(!resp.ok) throw new Error("API falhou: " + resp.status);
  const data = await resp.json();
  return data.content[0].text;               // o feedback do mentor
}</pre>
<p><b>O porém que muda a arquitetura:</b> chave de API num HTML é chave pública — qualquer um a rouba no F12. A solução é um <b>backend</b>: um servidor seu que guarda a chave e faz a ponte. E aí o círculo se fecha: um backend expõe seu CRUD como API REST, onde <code>GET</code>=Read, <code>POST</code>=Create, <code>PUT</code>=Update, <code>DELETE</code>=Delete — os mesmos 4 verbos da lição 2, agora via HTTP.</p>
<h3>💼 Especialista em CRUD: o que realmente diferencia</h3>
<p>Todo dev júnior faz um CRUD que funciona. O especialista domina o que acontece <b>nas bordas</b>:</p>
<ul>

  <li><b>Offline-first e sincronização</b> — o app funciona sem internet e concilia depois</li>
  <li><b>Testes automatizados</b> — a diferença entre "funciona na minha máquina" e confiança</li>
  <li><b>CRUD + IA</b> — o combo raro em 2026: dados estruturados alimentando modelos (este app é seu portfólio disso)</li>
</ul>

<h3>🎯 O que você vai aprender</h3>

  <li><b>CI</b> (integração contínua): testes rodando sozinhos a cada push</li>
  <li><b>CD</b> (entrega contínua): deploy automático quando o teste passa</li>
</ul>
<h3>📖 Conceito</h3>
<p>Git é uma máquina do tempo do código. O fluxo profissional: cada mudança nasce numa <b>branch</b>, vira um <b>Pull Request</b>, é revisada, e só então entra na principal. O que transforma isso em CI/CD é um robô (GitHub Actions) que, a cada push, instala, testa e — se tudo passar — publica. Ninguém faz deploy na mão; a esteira faz.</p>
<h3>💻 Código: uma esteira completa (.github/workflows/ci.yml)</h3>
<pre class="code"># Roda a cada push: se o teste falhar, o deploy nem acontece
name: CI/CD
on:
  push:
    branches: [main]

jobs:
  testar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4        # baixa o código
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci                      # instala dependências exatas
      - run: npm test                    # a rede de segurança da lição anterior
      - run: npm run build               # compila

  publicar:
    needs: testar                        # SÓ roda se "testar" passou
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npx vercel deploy --prod --token=$SEGREDO
        env:
          SEGREDO: \${{ secrets.VERCEL_TOKEN }}   # chave guardada no GitHub, nunca no código</pre>
<p>Boas mensagens de commit contam <b>o porquê</b>, não o óbvio: "fix: streak não quebrava após 2 dias (diffDias recebia ordem invertida)" ensina; "arrumei bug" não. O histórico do projeto é documentação que ninguém precisa escrever depois.</p>
<div class="onde">🔍 <b>Onde está neste app:</b> um arquivo único não precisa de esteira — mas o backend da lição 🚀 precisa. E o hábito de "commit a cada etapa funcional" já está nos blocos do Sprint 1-Dia (bloco 2, passo 4).</div>
<div class="desafio">🏆 <b>Desafio:</b> suba seu CRUD das lições básicas para o GitHub, crie o ci.yml acima (só o job "testar") e faça um push com teste quebrando de propósito. Ver o ❌ vermelho no PR é o objetivo.</div>` },

{ id:"docker", nivel:"Especialista", ico:"🐳", min:30,
  titulo:"Docker: 'funciona em qualquer máquina'",
  resumo:"Imagens, containers e compose — o fim do 'na minha máquina funciona'.",
  corpo:`
<h3>🎯 O que você vai aprender</h3>
<ul>
  <li>O que são <b>imagens</b> e <b>containers</b> (e a diferença)</li>
  <li>Escrever um <b>Dockerfile</b> para o backend da lição 🚀</li>
  <li>Orquestrar app + banco com <b>docker compose</b></li>
</ul>
<h3>📖 Conceito</h3>
<p>O problema: seu backend roda no seu Node 22, mas o servidor tem Node 16 e outra versão de Linux. Docker resolve empacotando o app <b>com o ambiente inteiro</b>. A <b>imagem</b> é a receita congelada (SO + Node + seu código); o <b>container</b> é a receita em execução. Mesma imagem = mesmo comportamento no seu PC, no servidor e no da empresa.</p>
<h3>💻 Código: Dockerfile do backend de tarefas</h3>
<pre class="code"># Dockerfile — cada linha vira uma CAMADA em cache
FROM node:22-alpine        # base: Linux mínimo + Node 22
WORKDIR /app

# 1º só o package.json: se o código mudar mas as dependências não,
# o npm ci não roda de novo (build 10x mais rápido)
COPY package*.json ./
RUN npm ci --omit=dev

COPY . .                   # agora sim, o código
EXPOSE 3000
USER node                  # segurança: não rodar como root
CMD ["node", "server.js"]</pre>
<h3>💻 Código: app + banco juntos (compose.yaml)</h3>
<pre class="code">services:
  api:
    build: .               # usa o Dockerfile acima
    ports: ["3000:3000"]   # porta do PC : porta do container
    environment:
      DATABASE_URL: postgres://amos:senha@db:5432/tarefas
    depends_on: [db]       # espera o banco subir

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: amos
      POSTGRES_PASSWORD: senha
    volumes:
      - dados:/var/lib/postgresql/data   # dados sobrevivem ao container

volumes:
  dados:</pre>
<p>Um comando — <code>docker compose up</code> — e qualquer pessoa do time sobe o sistema inteiro idêntico. Repare no <code>volumes</code>: containers são descartáveis, dados não; volume é onde o banco vive de verdade.</p>
<div class="onde">🔍 <b>Onde está neste app:</b> a ironia pedagógica — este .html é o "anti-Docker": zero dependências, roda até no celular. Docker existe para quando você sair do arquivo único (lição 🚀, passo 2). Cada tecnologia tem seu momento.</div>
<div class="desafio">🏆 <b>Desafio:</b> instale o Docker Desktop e rode <code>docker run -p 8080:80 nginx</code> — um servidor web em 10 segundos, sem instalar nginx. Depois escreva o Dockerfile do seu json-server da lição 🚀.</div>` },
